name: SoliGuard Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install optional deps (확장 경로 테스트 활성화)
        run: |
          python -m pip install --upgrade pip
          # 핵심 엔진은 의존성 0. 아래는 report/figma/quarantine/format 테스트 활성화용.
          pip install reportlab requests cryptography openpyxl python-docx chardet || true

      - name: Run unit tests
        run: python -m unittest discover -s tests -t . -v

  lint-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Byte-compile all modules (구문 검증, GUI 포함)
        run: python -m compileall -q soliguard
